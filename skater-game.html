<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skater vs Cop Pig</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', sans-serif;
    user-select: none;
    overflow: hidden;
  }
  h1 {
    color: #ff3377;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: 0 0 12px #ff3377aa;
  }
  #gameCanvas {
    border: 2px solid #ff3377;
    border-radius: 10px;
    box-shadow: 0 0 30px #ff337766;
    cursor: pointer;
    touch-action: none;
    max-width: 100vw;
  }
  p {
    color: #888;
    font-size: 0.75rem;
    margin-top: 8px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<h1>Skater vs Cop Pig</h1>
<canvas id="gameCanvas" width="800" height="260"></canvas>
<p>SPACE / TAP to jump &nbsp;|&nbsp; Dodge cones and the cop pig's donuts</p>

<script>
(function () {
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  const W  = canvas.width;
  const H  = canvas.height;
  const GROUND   = H - 40;
  const GRAV     = 1600;
  const JUMP_V   = -620;
  const BASE_SPD = 280;
  const SPD_STEP = 40;
  const LEVEL_EVERY = 12;
  const BASE_SHOOT  = 2.6;
  const SHOOT_MIN   = 1.0;

  let gameState = 'idle';
  let score, hiScore, level, spd, elapsed;
  let coneTimer, levelTimer, shootTimer;
  let cones, shots, particles;
  let lastTime;
  let groundOff = 0;
  let copArmAngle = 0, copShooting = 0;

  let bgImg = null, bgReady = false;

  const P = { x: 90, y: GROUND, w: 34, h: 54, vy: 0, grounded: true, frameTimer: 0 };

  /* ---- background ---- */
  (function () {
    bgImg = new Image();
    bgImg.onload = function () { bgReady = true; };
    bgImg.src = 'assets/images/graffiti-banner.jpg';
  })();

  function drawBg() {
    if (bgReady) {
      ctx.drawImage(bgImg, 0, 0, W, H);
      ctx.fillStyle = 'rgba(0,0,0,0.52)';
      ctx.fillRect(0, 0, W, H);
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#0e0e1a'); g.addColorStop(1, '#1e1a30');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }
  }

  function drawGround() {
    ctx.fillStyle = '#2d2d3a';
    ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.strokeStyle = '#ffee00aa'; ctx.lineWidth = 2;
    ctx.setLineDash([24, 18]);
    ctx.lineDashOffset = groundOff % 42;
    ctx.beginPath(); ctx.moveTo(0, GROUND + (H - GROUND)/2); ctx.lineTo(W, GROUND + (H - GROUND)/2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = '#ff337799'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
  }

  /* ---- player ---- */
  function drawPlayer() {
    const px = P.x, py = P.y;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(px, GROUND + 4, 20, 5, 0, 0, Math.PI * 2); ctx.fill();

    const boardY = py + 2;
    ctx.fillStyle = '#cc2255';
    ctx.beginPath(); ctx.roundRect(px - 22, boardY, 44, 7, 3); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(px - 14, boardY + 7, 5, 0, Math.PI * 2); ctx.arc(px + 14, boardY + 7, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff3377';
    ctx.beginPath(); ctx.arc(px - 14, boardY + 7, 3, 0, Math.PI * 2); ctx.arc(px + 14, boardY + 7, 3, 0, Math.PI * 2); ctx.fill();

    const top = py - P.h;
    ctx.fillStyle = '#e8215a'; ctx.beginPath(); ctx.roundRect(px - 11, top + 18, 22, 26, 4); ctx.fill();
    ctx.fillStyle = '#c41a4a'; ctx.beginPath(); ctx.arc(px, top + 18, 12, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#f4c48e'; ctx.beginPath(); ctx.arc(px, top + 13, 11, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(px - 4, top + 12, 2, 0, Math.PI * 2); ctx.arc(px + 4, top + 12, 2, 0, Math.PI * 2); ctx.fill();

    const kick = P.grounded ? Math.sin(P.frameTimer * 8) * 6 : 0;
    ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px - 4, top + 44); ctx.lineTo(px - 8 + kick, boardY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px + 4, top + 44); ctx.lineTo(px + 8 - kick, boardY); ctx.stroke();
    ctx.restore();
  }

  /* ---- cop pig ---- */
  function drawCopPig() {
    const cx = W - 70, cy = GROUND;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(cx, cy + 4, 24, 6, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#4a90d9'; ctx.beginPath(); ctx.roundRect(cx - 18, cy - 60, 36, 40, 6); ctx.fill();
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(cx - 4, cy - 45, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#b8860b'; ctx.font = 'bold 5px Arial'; ctx.textAlign = 'center'; ctx.fillText('PIG', cx - 4, cy - 43);

    ctx.fillStyle = '#2a60a0';
    ctx.fillRect(cx - 14, cy - 24, 10, 24); ctx.fillRect(cx + 4, cy - 24, 10, 24);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - 15, cy - 3, 12, 7); ctx.fillRect(cx + 3, cy - 3, 12, 7);

    ctx.fillStyle = '#ffaacc'; ctx.beginPath(); ctx.arc(cx, cy - 72, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2a60a0'; ctx.fillRect(cx - 20, cy - 92, 40, 6); ctx.fillRect(cx - 14, cy - 108, 28, 20);
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(cx, cy - 100, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff99bb'; ctx.beginPath(); ctx.ellipse(cx, cy - 69, 10, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#cc5577'; ctx.beginPath();
    ctx.arc(cx - 4, cy - 69, 2.5, 0, Math.PI * 2); ctx.arc(cx + 4, cy - 69, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath();
    ctx.arc(cx - 7, cy - 76, 5, 0, Math.PI * 2); ctx.arc(cx + 7, cy - 76, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath();
    ctx.arc(cx - 7, cy - 75, 2.5, 0, Math.PI * 2); ctx.arc(cx + 7, cy - 75, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.beginPath();
    ctx.moveTo(cx - 12, cy - 83); ctx.lineTo(cx - 3, cy - 80);
    ctx.moveTo(cx + 12, cy - 83); ctx.lineTo(cx + 3, cy - 80); ctx.stroke();

    const armAngle = copArmAngle;
    const armX = cx - 18 + Math.cos(armAngle) * 22;
    const armY = cy - 52 + Math.sin(armAngle) * 22;
    ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - 18, cy - 52); ctx.lineTo(armX, armY); ctx.stroke();
    ctx.fillStyle = '#ffaacc'; ctx.beginPath(); ctx.arc(armX, armY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* ---- cones ---- */
  function spawnCone() {
    cones.push({ x: W + 30, y: GROUND, w: 22, h: 38, spd, scored: false });
  }

  function drawCone(o) {
    ctx.save();
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.moveTo(o.x, o.y - o.h); ctx.lineTo(o.x - o.w/2, o.y); ctx.lineTo(o.x + o.w/2, o.y); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(o.x - o.w/2 + 2, o.y - 20, o.w - 4, 5);
    ctx.restore();
  }

  /* ---- cop shots ---- */
  function shoot() {
    const cx = W - 70, cy = GROUND;
    const rolling = Math.random() < 0.5;
    const startY  = rolling ? GROUND : cy - 52;
    const vy      = rolling ? 0 : -80 - Math.random() * 60;
    shots.push({
      x: cx - 20, y: startY,
      vx: -spd,
      vy,
      r: 11, rot: 0, rotSpd: (Math.random() - 0.5) * 10,
      scored: false,
    });
    copShooting = 0.25;
  }

  function drawShot(s) {
    ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
    ctx.fillStyle = '#c87941'; ctx.beginPath(); ctx.arc(0, 0, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(10,10,20,0.85)'; ctx.beginPath(); ctx.arc(0, 0, s.r * 0.38, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath(); ctx.arc(0, 0, s.r * 0.78, Math.PI + 0.3, -0.3); ctx.arc(0, 0, s.r * 0.55, -0.3, Math.PI + 0.3, true); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#00ffcc'; ctx.fillRect(-5, -s.r * 0.6, 3, 2);
    ctx.fillStyle = '#ffee00'; ctx.fillRect(2, s.r * 0.4, 3, 2);
    ctx.fillStyle = '#fff'; ctx.fillRect(-2, -s.r * 0.3, 3, 2);
    ctx.restore();
  }

  /* ---- collision ---- */
  function hitsPlayer(x, y, r) {
    const hw = P.w * 0.42, hh = P.h * 0.70;
    const cx = P.x, cy = P.y - hh / 2;
    const nearX = Math.max(cx - hw, Math.min(x, cx + hw));
    const nearY = Math.max(cy - hh/2, Math.min(y, cy + hh/2));
    return Math.hypot(x - nearX, y - nearY) < r;
  }

  function coneHitsPlayer(o) {
    const hw = P.w * 0.4, hh = P.h * 0.7;
    const px = P.x, py = P.y - hh / 2;
    return px + hw > o.x - o.w/2 && px - hw < o.x + o.w/2
        && py + hh/2 > o.y - o.h && py - hh/2 < o.y;
  }

  /* ---- particles ---- */
  function burst() {
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2, s = 80 + Math.random() * 220;
      particles.push({ x: P.x, y: P.y - P.h/2, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        life: 1, r: 3 + Math.random() * 6, col: ['#ff3377','#ffee00','#00ffcc','#ff6600'][Math.floor(Math.random()*4)] });
    }
  }

  /* ---- HUD ---- */
  function drawHUD() {
    ctx.save(); ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, 52);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.font = 'bold 18px "Arial Black",sans-serif';
    ctx.fillText(String(score).padStart(5,'0'), W - 85, 8);
    ctx.font = '10px Arial'; ctx.fillStyle = '#bbb'; ctx.fillText('SCORE', W - 85, 28);
    ctx.fillStyle = '#ffee00'; ctx.font = 'bold 13px "Arial Black",sans-serif';
    ctx.fillText('HI ' + String(hiScore).padStart(5,'0'), W - 85, 40);
    ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 14px "Arial Black",sans-serif';
    ctx.textAlign = 'left'; ctx.fillText('LVL ' + level, 12, 8);
    ctx.restore();
  }

  function drawIdle() {
    ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.68)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377'; ctx.font = 'bold 42px "Arial Black",sans-serif';
    ctx.fillText('SKATER VS COP PIG', W/2, H/2 - 42);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Arial';
    ctx.fillText('Tap / Space to Start', W/2, H/2 + 4);
    ctx.fillStyle = '#888'; ctx.font = '13px Arial';
    ctx.fillText("Jump over cones and dodge the cop's donuts", W/2, H/2 + 28);
    ctx.restore();
  }

  function drawDead() {
    ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377'; ctx.font = 'bold 46px "Arial Black",sans-serif';
    ctx.fillText('BUSTED!', W/2, H/2 - 48);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
    ctx.fillText('Score: ' + score, W/2, H/2);
    if (score > 0 && score >= hiScore) {
      ctx.fillStyle = '#ffee00'; ctx.font = 'bold 16px Arial';
      ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 28);
    }
    ctx.fillStyle = '#aaa'; ctx.font = '15px Arial';
    ctx.fillText('Tap / Space to Try Again', W/2, H/2 + 58);
    ctx.restore();
  }

  /* ---- reset ---- */
  function reset() {
    score = 0; hiScore = parseInt(localStorage.getItem('skaterHiScore') || '0', 10);
    level = 1; spd = BASE_SPD; elapsed = 0;
    coneTimer = 0; levelTimer = 0; shootTimer = 0;
    cones = []; shots = []; particles = [];
    copArmAngle = 0; copShooting = 0; groundOff = 0;
    P.y = GROUND; P.vy = 0; P.grounded = true; P.frameTimer = 0;
  }

  /* ---- loop ---- */
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = lastTime === null ? 0.016 : Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    drawBg();
    if (gameState === 'playing') groundOff -= spd * dt;
    drawGround();

    if (gameState === 'playing') {
      elapsed += dt; coneTimer += dt; levelTimer += dt; shootTimer += dt;

      copArmAngle = copShooting > 0
        ? -Math.PI * 0.55
        : Math.PI * 0.18 + Math.sin(elapsed * 1.4) * 0.12;
      if (copShooting > 0) copShooting -= dt;

      P.vy += GRAV * dt; P.y += P.vy * dt; P.frameTimer += dt;
      if (P.y >= GROUND) { P.y = GROUND; P.vy = 0; P.grounded = true; }

      const coneInt = Math.max(1.2, 2.8 - (level-1) * 0.12);
      if (coneTimer >= coneInt) { spawnCone(); coneTimer = 0; }

      const shootInt = Math.max(SHOOT_MIN, BASE_SHOOT - (level-1) * 0.18);
      if (shootTimer >= shootInt) { shoot(); shootTimer = 0; }

      if (levelTimer >= LEVEL_EVERY) { levelTimer = 0; level++; spd = BASE_SPD + (level-1) * SPD_STEP; }

      for (const o of cones) o.x -= o.spd * dt;
      cones = cones.filter(o => o.x > -60);
      for (const o of cones) { if (!o.scored && o.x + o.w/2 < P.x - P.w/2) { o.scored = true; score++; } }

      for (const s of shots) {
        s.x += s.vx * dt; s.y += s.vy * dt;
        s.vy += GRAV * 0.55 * dt;
        if (s.y > GROUND) { s.y = GROUND; s.vy = 0; }
        s.rot += s.rotSpd * dt;
      }
      shots = shots.filter(s => s.x > -40);
      for (const s of shots) { if (!s.scored && s.x + s.r < P.x - P.w/2) { s.scored = true; score++; } }

      let dead = false;
      for (const o of cones) { if (coneHitsPlayer(o)) { dead = true; break; } }
      if (!dead) { for (const s of shots) { if (hitsPlayer(s.x, s.y, s.r * 0.85)) { dead = true; break; } } }
      if (dead) {
        gameState = 'dead'; burst();
        if (score > hiScore) { hiScore = score; localStorage.setItem('skaterHiScore', hiScore); }
      }

      for (const p of particles) {
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= dt * 1.8;
      }
      particles = particles.filter(p => p.life > 0);
    }

    for (const o of cones) drawCone(o);
    for (const s of shots) drawShot(s);
    for (const p of particles) {
      ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    if (gameState !== 'dead' || particles.length > 0) drawPlayer();
    drawCopPig();
    drawHUD();
    if (gameState === 'idle') drawIdle();
    if (gameState === 'dead') drawDead();
  }

  /* ---- input ---- */
  function handleInput() {
    if (gameState === 'idle') { gameState = 'playing'; return; }
    if (gameState === 'dead') { reset(); gameState = 'playing'; return; }
    if (!P.grounded) return;
    P.vy = JUMP_V; P.grounded = false;
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(); }
  });
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleInput(); });

  reset();
  lastTime = null;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
