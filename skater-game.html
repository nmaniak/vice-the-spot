<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skater vs Cop Pig</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e1a; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Arial Black', sans-serif;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100dvh;
    cursor: pointer;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
(function () {
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  const GRAV      = 1600;
  const JUMP_V    = -620;
  const BASE_SPD  = 280;
  const SPD_STEP  = 40;
  const LEVEL_EVERY  = 12;
  const BASE_SHOOT   = 2.6;
  const SHOOT_MIN    = 1.0;
  const SHOT_HEIGHTS = [0, 28, 50, 70]; // px above ground

  let W, H, GROUND;

  let gameState = 'idle';
  let score, hiScore, level, spd, elapsed;
  let levelTimer, shootTimer;
  let shots, particles;
  let lastTime;
  let groundOff = 0;
  let copShooting = 0;

  let bgImg = null, bgReady = false;
  let skaterImg = null, skaterReady = false;
  let copImg = null, copReady = false;

  const P = { x: 90, y: 0, w: 34, h: 54, vy: 0, grounded: true, frameTimer: 0 };

  /* ---- images ---- */
  (function () {
    bgImg = new Image(); bgImg.onload = function () { bgReady = true; };
    bgImg.src = 'assets/images/graffiti-banner.jpg';
    skaterImg = new Image(); skaterImg.onload = function () { skaterReady = true; };
    skaterImg.src = 'assets/images/skater.svg';
    copImg = new Image(); copImg.onload = function () { copReady = true; };
    copImg.src = 'assets/images/cop-pig.svg';
  })();

  /* ---- resize ---- */
  function resize() {
    W = canvas.width  = canvas.offsetWidth  || 800;
    H = canvas.height = canvas.offsetHeight || 500;
    GROUND = H - Math.round(H * 0.14);
    if (gameState !== 'playing') P.y = GROUND;
  }

  /* ---- drawing ---- */
  function drawBg() {
    if (bgReady) {
      ctx.drawImage(bgImg, 0, 0, W, H);
      ctx.fillStyle = 'rgba(0,0,0,0.52)'; ctx.fillRect(0, 0, W, H);
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#0e0e1a'); g.addColorStop(1, '#1e1a30');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }
  }

  function drawGround() {
    ctx.fillStyle = '#2d2d3a'; ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.strokeStyle = '#ffee00aa'; ctx.lineWidth = 2;
    ctx.setLineDash([24, 18]); ctx.lineDashOffset = groundOff % 42;
    ctx.beginPath(); ctx.moveTo(0, GROUND + (H - GROUND) / 2); ctx.lineTo(W, GROUND + (H - GROUND) / 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = '#ff337799'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
  }

  function drawPlayer() {
    const px = P.x, py = P.y;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(px, GROUND + 4, 26, 5, 0, 0, Math.PI * 2); ctx.fill();
    if (skaterReady) {
      const sh = Math.round(H * 0.36), sw = Math.round(sh * 64 / 88);
      if (!P.grounded) {
        ctx.translate(px, py); ctx.rotate(-0.15);
        ctx.drawImage(skaterImg, -sw / 2, -sh, sw, sh);
      } else {
        ctx.drawImage(skaterImg, px - sw / 2, py - sh, sw, sh);
      }
    }
    ctx.restore();
  }

  function drawCopPig() {
    const cx = W - Math.round(W * 0.09), cy = GROUND;
    const sh = Math.round(H * 0.55), sw = Math.round(sh * 90 / 135);
    const drawX = cx - 48 * (sw / 80);
    const drawY = cy - 117 * (sh / 120);
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(cx + 5, cy + 4, 28, 6, 0, 0, Math.PI * 2); ctx.fill();
    if (copReady) {
      ctx.drawImage(copImg, drawX, drawY + (copShooting > 0 ? -6 : 0), sw, sh);
    }
    ctx.restore();
  }

  function drawShot(s) {
    ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rot);
    ctx.fillStyle = '#c87941'; ctx.beginPath(); ctx.arc(0, 0, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(10,10,20,0.85)'; ctx.beginPath(); ctx.arc(0, 0, s.r * 0.38, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath(); ctx.arc(0, 0, s.r * 0.78, Math.PI + 0.3, -0.3); ctx.arc(0, 0, s.r * 0.55, -0.3, Math.PI + 0.3, true); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#00ffcc'; ctx.fillRect(-5, -s.r * 0.6, 3, 2);
    ctx.fillStyle = '#ffee00'; ctx.fillRect(2, s.r * 0.4, 3, 2);
    ctx.fillStyle = '#fff'; ctx.fillRect(-2, -s.r * 0.3, 3, 2);
    ctx.restore();
  }

  /* ---- shoot ---- */
  function shoot() {
    const h = SHOT_HEIGHTS[Math.floor(Math.random() * SHOT_HEIGHTS.length)];
    const scaledH = Math.round(h * (H / 260)); // scale height to canvas size
    shots.push({
      x: W - Math.round(W * 0.12),
      y: GROUND - scaledH,
      vx: -spd,
      r: Math.round(12 * (H / 260)),
      rot: 0,
      rotSpd: (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 5),
      scored: false,
    });
    copShooting = 0.25;
  }

  /* ---- collision ---- */
  function hitsPlayer(x, y, r) {
    const hw = P.w * 0.42, hh = P.h * 0.70;
    const cx = P.x, cy = P.y - hh / 2;
    const nearX = Math.max(cx - hw, Math.min(x, cx + hw));
    const nearY = Math.max(cy - hh / 2, Math.min(y, cy + hh / 2));
    return Math.hypot(x - nearX, y - nearY) < r;
  }

  /* ---- HUD ---- */
  function drawHUD() {
    const fs = Math.max(14, Math.round(H * 0.07));
    ctx.save(); ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, fs * 2.8);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'right';
    ctx.font = `bold ${fs}px "Arial Black",sans-serif`;
    ctx.fillText(String(score).padStart(5,'0'), W - Math.round(W * 0.11), 8);
    ctx.fillStyle = '#ffee00'; ctx.font = `bold ${Math.round(fs * 0.75)}px "Arial Black",sans-serif`;
    ctx.fillText('HI ' + String(hiScore).padStart(5,'0'), W - Math.round(W * 0.11), fs + 10);
    ctx.fillStyle = '#00ffcc'; ctx.font = `bold ${Math.round(fs * 0.8)}px "Arial Black",sans-serif`;
    ctx.textAlign = 'left'; ctx.fillText('LVL ' + level, 12, 8);
    ctx.restore();
  }

  function drawIdle() {
    ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377'; ctx.font = `bold ${Math.round(H * 0.1)}px "Arial Black",sans-serif`;
    ctx.fillText('SKATER VS COP PIG', W / 2, H / 2 - H * 0.14);
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(H * 0.06)}px Arial`;
    ctx.fillText('TAP TO START', W / 2, H / 2);
    ctx.fillStyle = '#888'; ctx.font = `${Math.round(H * 0.04)}px Arial`;
    ctx.fillText("Dodge the cop's donuts", W / 2, H / 2 + H * 0.1);
    ctx.restore();
  }

  function drawDead() {
    ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377'; ctx.font = `bold ${Math.round(H * 0.14)}px "Arial Black",sans-serif`;
    ctx.fillText('BUSTED!', W / 2, H / 2 - H * 0.18);
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(H * 0.07)}px Arial`;
    ctx.fillText('Score: ' + score, W / 2, H / 2);
    if (score > 0 && score >= hiScore) {
      ctx.fillStyle = '#ffee00'; ctx.font = `bold ${Math.round(H * 0.05)}px Arial`;
      ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + H * 0.1);
    }
    ctx.fillStyle = '#aaa'; ctx.font = `${Math.round(H * 0.045)}px Arial`;
    ctx.fillText('Tap to Try Again', W / 2, H / 2 + H * 0.2);
    ctx.restore();
  }

  /* ---- reset ---- */
  function reset() {
    score = 0; hiScore = parseInt(localStorage.getItem('skaterHiScore') || '0', 10);
    level = 1; spd = BASE_SPD; elapsed = 0;
    levelTimer = 0; shootTimer = 0;
    shots = []; particles = [];
    copShooting = 0; groundOff = 0;
    P.y = GROUND; P.vy = 0; P.grounded = true; P.frameTimer = 0;
  }

  /* ---- loop ---- */
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = lastTime === null ? 0.016 : Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    drawBg();
    if (gameState === 'playing') groundOff -= spd * dt;
    drawGround();

    if (gameState === 'playing') {
      elapsed += dt; levelTimer += dt; shootTimer += dt;
      if (copShooting > 0) copShooting -= dt;

      P.vy += GRAV * dt; P.y += P.vy * dt; P.frameTimer += dt;
      if (P.y >= GROUND) { P.y = GROUND; P.vy = 0; P.grounded = true; }

      const shootInt = Math.max(SHOOT_MIN, BASE_SHOOT - (level - 1) * 0.18);
      if (shootTimer >= shootInt) { shoot(); shootTimer = 0; }

      if (levelTimer >= LEVEL_EVERY) { levelTimer = 0; level++; spd = BASE_SPD + (level - 1) * SPD_STEP; }

      for (const s of shots) { s.x += s.vx * dt; s.rot += s.rotSpd * dt; }
      shots = shots.filter(s => s.x > -60);
      for (const s of shots) { if (!s.scored && s.x + s.r < P.x - P.w / 2) { s.scored = true; score++; } }

      let dead = false;
      for (const s of shots) { if (hitsPlayer(s.x, s.y, s.r * 0.82)) { dead = true; break; } }
      if (dead) {
        gameState = 'dead';
        for (let i = 0; i < 20; i++) {
          const a = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 220;
          particles.push({ x: P.x, y: P.y - P.h / 2, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, r: 3 + Math.random() * 6, col: ['#ff3377','#ffee00','#00ffcc','#ff6600'][Math.floor(Math.random() * 4)] });
        }
        if (score > hiScore) { hiScore = score; localStorage.setItem('skaterHiScore', hiScore); }
      }

      for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= dt * 1.8; }
      particles = particles.filter(p => p.life > 0);
    }

    for (const s of shots) drawShot(s);
    for (const p of particles) {
      ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
    if (gameState !== 'dead' || particles.length > 0) drawPlayer();
    drawCopPig();
    drawHUD();
    if (gameState === 'idle') drawIdle();
    if (gameState === 'dead') drawDead();
  }

  /* ---- input ---- */
  function handleInput() {
    if (gameState === 'idle') { gameState = 'playing'; return; }
    if (gameState === 'dead') { reset(); gameState = 'playing'; return; }
    if (!P.grounded) return;
    P.vy = JUMP_V * (H / 260); P.grounded = false;
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(); }
  });
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleInput(); });
  window.addEventListener('resize', () => { resize(); if (gameState !== 'playing') reset(); });

  resize();
  reset();
  lastTime = null;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
