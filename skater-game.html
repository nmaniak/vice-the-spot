<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skater vs Cop Pig</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', sans-serif;
    user-select: none;
    overflow: hidden;
  }
  h1 {
    color: #ff3377;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: 0 0 12px #ff3377aa;
  }
  #gameCanvas {
    border: 2px solid #ff3377;
    border-radius: 10px;
    box-shadow: 0 0 30px #ff337766;
    cursor: pointer;
    touch-action: none;
    max-width: 100vw;
  }
  p {
    color: #888;
    font-size: 0.75rem;
    margin-top: 8px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<h1>Skater vs Cop Pig</h1>
<canvas id="gameCanvas" width="800" height="260"></canvas>
<p>SPACE / TAP to jump &nbsp;|&nbsp; Avoid everything the pig throws at you</p>

<script>
(function () {
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');

  // ─── constants ────────────────────────────────────────────────────────────
  const W  = canvas.width;
  const H  = canvas.height;
  const GROUND   = H - 40;          // y of ground surface
  const GRAV     = 1600;            // px/s²
  const JUMP_V   = -620;            // px/s  (negative = up)
  const BASE_SPD = 260;             // px/s  initial obstacle speed
  const SPD_STEP = 40;              // px/s  added each level
  const LEVEL_EVERY = 12;           // seconds between speed bumps

  // ─── state ────────────────────────────────────────────────────────────────
  let gameState = 'idle';  // idle | playing | dead
  let score, hiScore, level, spd, elapsed, lastTime;
  let spawnTimer, levelTimer;
  let obstacles = [];
  let particles = [];

  // ─── player ───────────────────────────────────────────────────────────────
  const P = {
    x: 110, y: GROUND,
    w: 34,  h: 54,
    vy: 0,
    grounded: true,
    frame: 0, frameTimer: 0,
  };

  // ─── city bg layers ───────────────────────────────────────────────────────
  const skyBuildings = [];
  const midBuildings = [];
  const groundDecals = [];  // graffiti marks on floor

  function initBg() {
    skyBuildings.length = 0;
    midBuildings.length = 0;
    groundDecals.length = 0;

    let x = 0;
    while (x < W + 200) {
      skyBuildings.push({
        x,
        w: 40 + Math.random() * 80,
        h: 60 + Math.random() * 100,
        col: `hsl(${220 + Math.random() * 40},${20 + Math.random() * 20}%,${14 + Math.random() * 10}%)`,
        windows: Math.random() > 0.3,
      });
      x += skyBuildings[skyBuildings.length - 1].w + 2 + Math.random() * 20;
    }

    x = 0;
    while (x < W + 200) {
      midBuildings.push({
        x,
        w: 30 + Math.random() * 60,
        h: 30 + Math.random() * 60,
        col: `hsl(${210 + Math.random() * 30},${15 + Math.random() * 15}%,${20 + Math.random() * 10}%)`,
      });
      x += midBuildings[midBuildings.length - 1].w + 1 + Math.random() * 10;
    }

    for (let i = 0; i < 18; i++) {
      groundDecals.push({
        x: Math.random() * W * 2,
        col: ['#ff337755','#00ffcc44','#ffee0033'][Math.floor(Math.random() * 3)],
        r: 3 + Math.random() * 8,
      });
    }
  }

  let bgX1 = 0, bgX2 = 0;   // sky / mid scroll offsets (parallax)

  function scrollBg(dt) {
    bgX1 -= spd * 0.15 * dt;
    bgX2 -= spd * 0.35 * dt;

    // wrap buildings
    for (const b of skyBuildings) {
      b.x += bgX1;    // apply delta stored in bgX1
    }
    for (const b of midBuildings) {
      b.x += bgX2;
    }
    bgX1 = 0; bgX2 = 0;
  }

  // A simpler and correct parallax approach:
  let skyOffset = 0, midOffset = 0, groundOffset = 0;

  function updateBgOffsets(dt) {
    skyOffset    = (skyOffset    - spd * 0.08 * dt);
    midOffset    = (midOffset    - spd * 0.30 * dt);
    groundOffset = (groundOffset - spd * dt);
  }

  // ─── drawing helpers ──────────────────────────────────────────────────────
  function drawBuildings(list, offset, yBase, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    for (const b of list) {
      const x = ((b.x + offset) % (W + 300) + W + 300) % (W + 300) - 200;
      ctx.fillStyle = b.col;
      ctx.fillRect(x, yBase - b.h, b.w, b.h);
      if (b.windows) {
        ctx.fillStyle = 'rgba(255,220,80,0.25)';
        for (let wy = yBase - b.h + 6; wy < yBase - 8; wy += 14) {
          for (let wx = x + 5; wx < x + b.w - 8; wx += 12) {
            if (Math.random() > 0.4) ctx.fillRect(wx, wy, 6, 8);
          }
        }
      }
    }
    ctx.restore();
  }

  function drawGround() {
    // road
    ctx.fillStyle = '#2d2d3a';
    ctx.fillRect(0, GROUND, W, H - GROUND);

    // centre dashes
    ctx.strokeStyle = '#ffee00aa';
    ctx.lineWidth = 2;
    ctx.setLineDash([24, 18]);
    ctx.lineDashOffset = groundOffset % 42;
    ctx.beginPath();
    ctx.moveTo(0, GROUND + (H - GROUND) / 2);
    ctx.lineTo(W, GROUND + (H - GROUND) / 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // kerb line
    ctx.strokeStyle = '#ff337788';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND);
    ctx.lineTo(W, GROUND);
    ctx.stroke();
  }

  // ─── player drawing ───────────────────────────────────────────────────────
  function drawPlayer() {
    const x = P.x - P.w / 2;
    const y = P.y - P.h;
    ctx.save();

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(P.x, GROUND + 4, 20, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // board
    ctx.fillStyle = '#cc2255';
    const boardY = P.y + 2;
    ctx.beginPath();
    ctx.roundRect(P.x - 22, boardY, 44, 7, 3);
    ctx.fill();
    // wheels
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(P.x - 14, boardY + 7, 5, 0, Math.PI * 2);
    ctx.arc(P.x + 14, boardY + 7, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff3377';
    ctx.beginPath();
    ctx.arc(P.x - 14, boardY + 7, 3, 0, Math.PI * 2);
    ctx.arc(P.x + 14, boardY + 7, 3, 0, Math.PI * 2);
    ctx.fill();

    // body / hoodie
    ctx.fillStyle = '#e8215a';
    ctx.beginPath();
    ctx.roundRect(x + 6, y + 18, 22, 26, 4);
    ctx.fill();

    // hood
    ctx.fillStyle = '#c41a4a';
    ctx.beginPath();
    ctx.arc(P.x, y + 18, 12, Math.PI, 0);
    ctx.fill();

    // head
    ctx.fillStyle = '#f4c48e';
    ctx.beginPath();
    ctx.arc(P.x, y + 13, 11, 0, Math.PI * 2);
    ctx.fill();

    // eyes
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(P.x - 4, y + 12, 2, 0, Math.PI * 2);
    ctx.arc(P.x + 4, y + 12, 2, 0, Math.PI * 2);
    ctx.fill();

    // legs with animation
    const kick = P.grounded ? Math.sin(P.frameTimer * 8) * 6 : 0;
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    // left leg
    ctx.beginPath();
    ctx.moveTo(P.x - 4, y + 44);
    ctx.lineTo(P.x - 8 + kick, boardY);
    ctx.stroke();
    // right leg
    ctx.beginPath();
    ctx.moveTo(P.x + 4, y + 44);
    ctx.lineTo(P.x + 8 - kick, boardY);
    ctx.stroke();

    ctx.restore();
  }

  // ─── cop pig drawing ──────────────────────────────────────────────────────
  function drawCopPig() {
    const cx = W - 70;
    const cy = GROUND;
    ctx.save();

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, 24, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.fillStyle = '#4a90d9';  // cop blue
    ctx.beginPath();
    ctx.roundRect(cx - 18, cy - 60, 36, 40, 6);
    ctx.fill();

    // badge
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 45, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold 5px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PIG', cx - 4, cy - 43);

    // legs
    ctx.fillStyle = '#2a60a0';
    ctx.fillRect(cx - 14, cy - 24, 10, 24);
    ctx.fillRect(cx + 4,  cy - 24, 10, 24);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - 15, cy - 3, 12, 7);
    ctx.fillRect(cx + 3,  cy - 3, 12, 7);

    // head — pig snout, hat
    ctx.fillStyle = '#ffaacc';
    ctx.beginPath();
    ctx.arc(cx, cy - 72, 18, 0, Math.PI * 2);
    ctx.fill();

    // cop hat
    ctx.fillStyle = '#2a60a0';
    ctx.fillRect(cx - 20, cy - 92, 40, 6);
    ctx.fillRect(cx - 14, cy - 108, 28, 20);
    // hat badge
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(cx, cy - 100, 4, 0, Math.PI * 2);
    ctx.fill();

    // snout
    ctx.fillStyle = '#ff99bb';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 69, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cc5577';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 69, 2.5, 0, Math.PI * 2);
    ctx.arc(cx + 4, cy - 69, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 7, cy - 76, 5, 0, Math.PI * 2);
    ctx.arc(cx + 7, cy - 76, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(cx - 7, cy - 75, 2.5, 0, Math.PI * 2);
    ctx.arc(cx + 7, cy - 75, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // angry brows
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy - 83); ctx.lineTo(cx - 3, cy - 80);
    ctx.moveTo(cx + 12, cy - 83); ctx.lineTo(cx + 3, cy - 80);
    ctx.stroke();

    // arm holding baton
    ctx.strokeStyle = '#4a90d9';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 18, cy - 52);
    ctx.lineTo(cx - 40, cy - 64);
    ctx.stroke();
    // baton
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(cx - 40, cy - 66);
    ctx.lineTo(cx - 55, cy - 80);
    ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(cx - 40, cy - 66, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ─── obstacle types ───────────────────────────────────────────────────────
  // type: 'pothole' | 'cone' | 'trash' | 'donut' | 'board'
  function spawnObstacle() {
    const types = ['cone', 'cone', 'trash', 'donut', 'pothole', 'board'];
    const type  = types[Math.floor(Math.random() * types.length)];
    let h = 36, w = 24, airborne = false;

    if (type === 'pothole') { h = 10; w = 50; }
    if (type === 'cone')    { h = 38; w = 22; }
    if (type === 'trash')   { h = 44; w = 26; }
    if (type === 'donut')   { h = 24; w = 24; airborne = true; }
    if (type === 'board')   { h = 14; w = 44; }

    const launchY = airborne
      ? GROUND - 30 - Math.random() * 40   // rolling along ground slightly raised
      : GROUND;

    obstacles.push({
      type, x: W + 40, y: launchY,
      w, h,
      spd: spd + (Math.random() - 0.5) * 20,
    });
  }

  function drawObstacle(o) {
    ctx.save();
    const x = o.x;
    const y = o.y;

    if (o.type === 'pothole') {
      ctx.fillStyle = '#111118';
      ctx.beginPath();
      ctx.ellipse(x, y - 5, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    if (o.type === 'cone') {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.moveTo(x, y - o.h);
      ctx.lineTo(x - o.w / 2, y);
      ctx.lineTo(x + o.w / 2, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.fillRect(x - o.w / 2 + 2, y - 20, o.w - 4, 5);
    }

    if (o.type === 'trash') {
      ctx.fillStyle = '#556b2f';
      ctx.fillRect(x - o.w / 2, y - o.h, o.w, o.h);
      ctx.fillStyle = '#3a5020';
      ctx.fillRect(x - o.w / 2, y - o.h, o.w, 8);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(x - o.w / 2, y - o.h + 8 + i * 10);
        ctx.lineTo(x + o.w / 2, y - o.h + 8 + i * 10);
        ctx.stroke();
      }
    }

    if (o.type === 'donut') {
      const prog = elapsed % 0.5 / 0.5;
      ctx.fillStyle = '#c87941';
      ctx.beginPath();
      ctx.arc(x, y - o.h / 2, o.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(x, y - o.h / 2, o.w / 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff88aa';
      ctx.fillRect(x - 7, y - o.h / 2 - 2, 14, 3);
      // sprinkles
      ctx.fillStyle = '#00ffcc'; ctx.fillRect(x - 5, y - o.h / 2 - 6, 4, 2);
      ctx.fillStyle = '#ffee00'; ctx.fillRect(x + 2, y - o.h / 2 + 4, 4, 2);
    }

    if (o.type === 'board') {
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.roundRect(x - o.w / 2, y - o.h, o.w, o.h - 4, 3);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(x - 14, y - 4, 4, 0, Math.PI * 2);
      ctx.arc(x + 14, y - 4, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // ─── particles ────────────────────────────────────────────────────────────
  function burst(px, py) {
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 220;
      particles.push({
        x: px, y: py,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        r: 3 + Math.random() * 6,
        col: ['#ff3377','#ffee00','#00ffcc','#ff6600'][Math.floor(Math.random() * 4)],
      });
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= dt * 1.8;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── collision ────────────────────────────────────────────────────────────
  function collides(o) {
    const px = P.x, py = P.y;
    const pw = P.w * 0.55, ph = P.h * 0.75;
    if (o.type === 'pothole') {
      return py >= GROUND - 2
          && px + pw / 2 > o.x - o.w / 2
          && px - pw / 2 < o.x + o.w / 2;
    }
    const ox = o.x, oy = o.y - o.h / 2;
    const or = Math.min(o.w, o.h) / 2;
    return Math.hypot(ox - px, oy - (py - ph / 2)) < or + Math.min(pw, ph) / 2;
  }

  // ─── HUD ──────────────────────────────────────────────────────────────────
  function drawHUD() {
    ctx.save();
    // score
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px "Arial Black", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(String(score).padStart(5, '0'), W - 80, 28);
    ctx.font = '11px Arial';
    ctx.fillStyle = '#aaa';
    ctx.fillText('SCORE', W - 80, 42);

    // hi score
    ctx.fillStyle = '#ffee00';
    ctx.font = 'bold 14px "Arial Black"';
    ctx.fillText('HI ' + String(hiScore).padStart(5, '0'), W - 80, 60);

    // level
    ctx.fillStyle = '#00ffcc';
    ctx.font = 'bold 13px "Arial Black"';
    ctx.textAlign = 'left';
    ctx.fillText('LVL ' + level, 12, 28);

    ctx.restore();
  }

  // ─── overlay screens ──────────────────────────────────────────────────────
  function drawIdle() {
    ctx.save();
    ctx.fillStyle = 'rgba(10,10,20,0.72)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377';
    ctx.font = 'bold 42px "Arial Black"';
    ctx.fillText('SKATER VS COP PIG', W / 2, H / 2 - 40);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Tap / Space to Start', W / 2, H / 2 + 10);

    ctx.fillStyle = '#888';
    ctx.font = '13px Arial';
    ctx.fillText('Avoid everything the Cop Pig throws at you', W / 2, H / 2 + 36);

    ctx.restore();
  }

  function drawDead() {
    ctx.save();
    ctx.fillStyle = 'rgba(10,10,20,0.78)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3377';
    ctx.font = 'bold 46px "Arial Black"';
    ctx.fillText('BUSTED!', W / 2, H / 2 - 50);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Arial';
    ctx.fillText('Score: ' + score, W / 2, H / 2);

    if (score >= hiScore && score > 0) {
      ctx.fillStyle = '#ffee00';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('NEW HIGH SCORE!', W / 2, H / 2 + 28);
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '15px Arial';
    ctx.fillText('Tap / Space to Try Again', W / 2, H / 2 + 60);

    ctx.restore();
  }

  // ─── init / reset ─────────────────────────────────────────────────────────
  function reset() {
    score     = 0;
    level     = 1;
    spd       = BASE_SPD;
    elapsed   = 0;
    lastTime  = null;
    spawnTimer  = 0;
    levelTimer  = 0;
    obstacles = [];
    particles = [];

    P.y = GROUND;
    P.vy = 0;
    P.grounded = true;
    P.frameTimer = 0;

    hiScore = parseInt(localStorage.getItem('skaterHiScore') || '0', 10);
    initBg();
  }

  function jump() {
    if (!P.grounded) return;
    P.vy = JUMP_V;
    P.grounded = false;
  }

  // ─── main loop ────────────────────────────────────────────────────────────
  let rafId = null;

  function loop(ts) {
    rafId = requestAnimationFrame(loop);

    const dt = lastTime === null ? 0.016 : Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    // ── background ──
    ctx.fillStyle = '#0e0e1a';
    ctx.fillRect(0, 0, W, H);

    // sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
    grad.addColorStop(0, '#0e0e1a');
    grad.addColorStop(1, '#1e1a30');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND);

    if (gameState !== 'idle') updateBgOffsets(dt);

    drawBuildings(skyBuildings, skyOffset * 0.08, GROUND - 20, 0.6);
    drawBuildings(midBuildings, skyOffset * 0.30, GROUND - 10, 0.85);
    drawGround();

    if (gameState === 'playing') {
      elapsed     += dt;
      spawnTimer  += dt;
      levelTimer  += dt;

      // player physics
      P.vy        += GRAV * dt;
      P.y         += P.vy * dt;
      P.frameTimer += dt;
      if (P.y >= GROUND) {
        P.y = GROUND;
        P.vy = 0;
        P.grounded = true;
      }

      // spawn
      const spawnInterval = Math.max(0.9, 2.2 - level * 0.1);
      if (spawnTimer >= spawnInterval) {
        spawnObstacle();
        spawnTimer = 0;
      }

      // level up
      if (levelTimer >= LEVEL_EVERY) {
        levelTimer = 0;
        level++;
        spd = BASE_SPD + (level - 1) * SPD_STEP;
      }

      // move obstacles
      for (const o of obstacles) o.x -= o.spd * dt;
      obstacles = obstacles.filter(o => o.x > -100);

      // score = obstacles fully passed
      for (const o of obstacles) {
        if (!o.scored && o.x + o.w / 2 < P.x - P.w / 2) {
          o.scored = true;
          score++;
        }
      }

      // collision check
      for (const o of obstacles) {
        if (collides(o)) {
          gameState = 'dead';
          burst(P.x, P.y - P.h / 2);
          if (score > hiScore) {
            hiScore = score;
            localStorage.setItem('skaterHiScore', hiScore);
          }
          break;
        }
      }

      updateParticles(dt);
    }

    // draw obstacles
    for (const o of obstacles) drawObstacle(o);

    // draw player (not if just died and burst already drew)
    drawParticles();
    if (gameState !== 'dead' || particles.length) drawPlayer();
    drawCopPig();
    drawHUD();

    if (gameState === 'idle') drawIdle();
    if (gameState === 'dead') drawDead();
  }

  // ─── input ────────────────────────────────────────────────────────────────
  function handleInput() {
    if (gameState === 'idle') {
      gameState = 'playing';
      return;
    }
    if (gameState === 'dead') {
      reset();
      gameState = 'playing';
      return;
    }
    jump();
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      handleInput();
    }
  });
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    handleInput();
  });

  // ─── boot ─────────────────────────────────────────────────────────────────
  reset();
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
