<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64">
  <defs>
    <mask id="m">
      <circle cx="0" cy="0" r="30" fill="white"/>
      <circle cx="0" cy="0" r="11" fill="black"/>
    </mask>
  </defs>
  <!-- Base ring body -->
  <circle cx="0" cy="0" r="30" fill="#c87941"/>
  <!-- Dark shading -->
  <circle cx="2" cy="3" r="30" fill="#6b3010" opacity="0.35" mask="url(#m)"/>
  <!-- Top highlight -->
  <ellipse cx="-10" cy="-13" rx="9" ry="6" fill="#e8a055" opacity="0.5" mask="url(#m)"/>
  <!-- Pink icing covering upper portion of ring -->
  <path d="M-25,-4 C-24,-23 -14,-29 0,-28 C14,-29 24,-23 25,-4 C20,-11 13,-16 6,-13 C3,-9 1,-15 0,-15 C-1,-15 -3,-9 -6,-13 C-13,-16 -20,-11 -25,-4Z" fill="#ff88aa" mask="url(#m)"/>
  <!-- Icing highlight shimmer -->
  <ellipse cx="-6" cy="-20" rx="7" ry="3" fill="#ffaabb" opacity="0.6" mask="url(#m)"/>
  <!-- Hole -->
  <circle cx="0" cy="0" r="11" fill="#0a0a14"/>
  <!-- Hole inner highlight -->
  <ellipse cx="-3" cy="-3" rx="4" ry="3" fill="#1a1a2e" opacity="0.8"/>
  <!-- Sprinkles on icing -->
  <g mask="url(#m)">
    <rect x="-22" y="-19" width="9" height="3.5" rx="1.75" fill="#00ffcc" transform="rotate(35,-18,-17)"/>
    <rect x="-4" y="-26" width="9" height="3.5" rx="1.75" fill="#ffee00" transform="rotate(-8,0,-24)"/>
    <rect x="11" y="-21" width="8" height="3.5" rx="1.75" fill="#ffffff" transform="rotate(48,15,-19)"/>
    <rect x="-18" y="-11" width="7" height="3" rx="1.5" fill="#ff6600" transform="rotate(-30,-15,-10)"/>
    <rect x="9" y="-14" width="7" height="3" rx="1.5" fill="#cc44ff" transform="rotate(22,12,-13)"/>
    <rect x="-5" y="-15" width="6" height="3" rx="1.5" fill="#ff3377" transform="rotate(8,-2,-14)"/>
  </g>
</svg>
