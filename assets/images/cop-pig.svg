<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" overflow="visible">
  <!-- Boots -->
  <rect x="28" y="108" width="17" height="9" rx="3" fill="#111"/>
  <rect x="50" y="108" width="17" height="9" rx="3" fill="#111"/>

  <!-- Legs -->
  <rect x="30" y="86" width="15" height="26" rx="4" fill="#2a60a0"/>
  <rect x="52" y="86" width="15" height="26" rx="4" fill="#2a60a0"/>

  <!-- Body -->
  <rect x="24" y="48" width="48" height="42" rx="7" fill="#4a90d9"/>
  <!-- Uniform belt -->
  <rect x="24" y="82" width="48" height="7" rx="2" fill="#2a60a0"/>

  <!-- Badge -->
  <circle cx="38" cy="64" r="8" fill="#ffd700"/>
  <circle cx="38" cy="64" r="5" fill="#f0c000"/>
  <text x="38" y="67" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="5" fill="#8B6914">★</text>

  <!-- Throwing arm (left — toward skater) -->
  <rect x="2" y="52" width="24" height="10" rx="5" fill="#4a90d9"/>
  <!-- Fist -->
  <circle cx="5" cy="57" r="7" fill="#f4c48e"/>
  <!-- Baton -->
  <line x1="5" y1="52" x2="-2" y2="34" stroke="#2a1a0a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="-2" cy="34" r="6" fill="#1a1a1a"/>
  <line x1="-2" y1="34" x2="-5" y2="24" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

  <!-- Right arm (resting) -->
  <rect x="70" y="56" width="10" height="9" rx="4" fill="#4a90d9"/>

  <!-- Head -->
  <circle cx="48" cy="33" r="22" fill="#ffbbcc"/>

  <!-- Hat brim -->
  <rect x="20" y="17" width="56" height="7" rx="3" fill="#2a60a0"/>
  <!-- Hat crown -->
  <rect x="28" y="2" width="40" height="19" rx="5" fill="#2a60a0"/>
  <!-- Hat highlight -->
  <rect x="30" y="3" width="36" height="4" rx="2" fill="#3a78cc" opacity="0.4"/>
  <!-- Hat badge -->
  <circle cx="48" cy="11" r="6" fill="#ffd700"/>
  <circle cx="48" cy="11" r="4" fill="#f0c000"/>
  <text x="48" y="14" text-anchor="middle" font-family="Arial" font-size="6" fill="#8B6914">★</text>

  <!-- Snout -->
  <ellipse cx="48" cy="38" rx="12" ry="9" fill="#ffaacc"/>
  <!-- Snout highlight -->
  <ellipse cx="45" cy="35" rx="4" ry="3" fill="#ffccdd" opacity="0.7"/>
  <!-- Nostrils -->
  <circle cx="44" cy="39" r="3.5" fill="#cc5577"/>
  <circle cx="52" cy="39" r="3.5" fill="#cc5577"/>

  <!-- Eyes (angry) -->
  <circle cx="38" cy="26" r="7" fill="white"/>
  <circle cx="58" cy="26" r="7" fill="white"/>
  <circle cx="38" cy="27" r="4" fill="#111"/>
  <circle cx="58" cy="27" r="4" fill="#111"/>
  <circle cx="39.5" cy="25.5" r="1.5" fill="white"/>
  <circle cx="59.5" cy="25.5" r="1.5" fill="white"/>

  <!-- Angry eyebrows -->
  <line x1="30" y1="17" x2="43" y2="21" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="66" y1="17" x2="53" y2="21" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Mouth (grin) -->
  <path d="M 40 46 Q 48 51 56 46" stroke="#cc4466" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
